- name: Install Deployment Client
  ansible.builtin.shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    executable: /bin/bash
  become: true
  tags: always
- name: Ensure jq is installed
  ansible.builtin.package:
    name: jq
    state: present
  become: true
  tags: always
