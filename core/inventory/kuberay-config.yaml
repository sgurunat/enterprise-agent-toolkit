# ---------------------------------------------------------------------------
# KubeRay Configuration
#
# This file controls all tuning parameters for the Ray distributed computing
# cluster deployed by the Agentic AI Stack.
#
# To enable/disable the KubeRay deployment altogether, use the toggle in
# agentic-config.cfg:
#   deploy_kuberay=on   # enable
#   deploy_kuberay=off  # disable (default)
#
# After editing this file, re-run the deploy script to apply changes:
#   ./deploy-agentic-stack.sh
#
# In-cluster access points (after deployment):
#   Ray Client API  : ray://ray-cluster-head-svc.<namespace>.svc.cluster.local:10001
#   Ray Dashboard   : http://ray-cluster-head-svc.<namespace>.svc.cluster.local:8265
#   Port-forward    : kubectl port-forward svc/ray-cluster-head-svc 8265:8265 -n <namespace>
# ---------------------------------------------------------------------------

# Kubernetes namespace for all Ray resources (operator + cluster)
namespace: ray-system

cluster:
  # Name of the RayCluster Kubernetes resource (must be DNS-label safe)
  name: ray-cluster

  # ---------------------------------------------------------------------------
  # Ray container image
  # The version of this image MUST match the ray[default] package version used
  # in any client that connects to the cluster (e.g. the Coding Agent).
  # See: https://hub.docker.com/r/rayproject/ray/tags
  # ---------------------------------------------------------------------------
  rayImage: rayproject/ray:2.40.0-py312

  # ---------------------------------------------------------------------------
  # Head node
  # The head pod is the Ray scheduler/coordinator. Setting num-cpus=0 (via the
  # chart default) prevents user tasks from running on the head — all workloads
  # execute on worker pods.
  # ---------------------------------------------------------------------------
  head:
    cpuRequest: "500m"
    cpuLimit: "1"
    memoryRequest: "2Gi"
    memoryLimit: "4Gi"

  # ---------------------------------------------------------------------------
  # Worker group
  # Workers are the pods that execute Ray tasks and actors.
  #
  # replicas     — initial number of workers created at cluster startup
  # minReplicas  — floor for the Ray autoscaler (set equal to replicas to
  #                disable automatic scale-in)
  # maxReplicas  — ceiling for the Ray autoscaler
  #
  # Resource sizing guide:
  #   Light   (dev / single-node laptop)  : request=500m  limit=2    mem=2Gi/4Gi
  #   Medium  (default — this config)     : request=500m  limit=2    mem=2Gi/4Gi
  #   Heavy   (multi-node / GPU cluster)  : request=2     limit=8    mem=8Gi/16Gi
  # ---------------------------------------------------------------------------
  worker:
    groupName: default-worker
    replicas: 2
    minReplicas: 1
    maxReplicas: 4
    cpuRequest: "500m"
    cpuLimit: "2"
    memoryRequest: "2Gi"
    memoryLimit: "4Gi"
