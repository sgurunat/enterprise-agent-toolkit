#
# scale.yml — Add worker node(s) to an existing kubeadm cluster.
#
# This playbook ONLY runs the worker-join flow. It does NOT touch the control
# plane cluster state (no kubeadm reset, no kubeadm init). Safe to run against
# a live cluster.
#
# Usage (called by add-node.sh):
#   ansible-playbook -i <inventory> playbooks/scale.yml \
#       --limit "kube_control_plane,<new_worker>" --become --become-user=root
---
 
# ── Play 1: Generate a fresh join token on the control plane ──────────────────
- name: Generate kubeadm join command on control plane
  hosts: kube_control_plane
  gather_facts: false
  become: true
  tasks:
    - name: Generate kubeadm join command
      command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Store join command as host fact
      set_fact:
        join_command: "{{ join_command_raw.stdout }}"

# ── Play 2: Set up and join new worker node(s) ────────────────────────────────
- name: Join new worker node(s) to the cluster
  hosts: kube_node:!kube_control_plane
  gather_facts: true
  become: true
  vars:
    kube_version: "v1.31.4"
    kube_dl_base: "https://dl.k8s.io/release/{{ kube_version }}/bin/linux/amd64"
    proxy_raw:
      HTTP_PROXY: "{{ lookup('env', 'HTTP_PROXY') }}"
      HTTPS_PROXY: "{{ lookup('env', 'HTTPS_PROXY') }}"
      NO_PROXY: "{{ lookup('env', 'NO_PROXY') }}"
      http_proxy: "{{ lookup('env', 'HTTP_PROXY') }}"
      https_proxy: "{{ lookup('env', 'HTTPS_PROXY') }}"
      no_proxy: "{{ lookup('env', 'NO_PROXY') }}"
    # Filter out empty values so tools see no proxy vars when none are configured
    proxy_env: "{{ proxy_raw | dict2items | selectattr('value') | list | items2dict }}"
  tasks:
    # ── Prerequisites: kernel modules, sysctl, packages, containerd ──────────
    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules across reboots
      copy:
        dest: /etc/modules-load.d/k8s.conf
        mode: '0644'
        content: |
          overlay
          br_netfilter

    - name: Enable IP forwarding and bridge netfilter
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: net.ipv4.ip_forward, value: "1" }
        - { key: net.bridge.bridge-nf-call-iptables, value: "1" }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: "1" }

    - name: Persist sysctl settings across reboots
      copy:
        dest: /etc/sysctl.d/99-kubernetes.conf
        mode: '0644'
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1

    - name: Add node hostname to /etc/hosts if not resolvable
      lineinfile:
        path: /etc/hosts
        line: "{{ ansible_default_ipv4.address }} {{ inventory_hostname }}"
        regexp: "{{ inventory_hostname }}$"
        state: present

    - name: Install required system packages (Debian/Ubuntu)
      apt:
        name:
          - conntrack
          - iptables
          - ethtool
          - socat
          - apt-transport-https
          - ca-certificates
          - curl
        state: present
        update_cache: true
      environment: "{{ proxy_env }}"
      when: ansible_os_family == "Debian"

    - name: Install required system packages (RHEL/CentOS)
      yum:
        name:
          - conntrack-tools
          - iptables
          - ethtool
          - socat
          - ca-certificates
          - curl
        state: present
      environment: "{{ proxy_env }}"
      when: ansible_os_family == "RedHat"

    - name: Install containerd (Debian/Ubuntu)
      apt:
        name: containerd
        state: present
      environment: "{{ proxy_env }}"
      when: ansible_os_family == "Debian"

    - name: Install containerd (RHEL/CentOS)
      yum:
        name: containerd.io
        state: present
      environment: "{{ proxy_env }}"
      when: ansible_os_family == "RedHat"

    - name: Create containerd config directory
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Set SystemdCgroup = true in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup\s*=\s*false'
        replace: 'SystemdCgroup = true'

    - name: Ensure containerd systemd drop-in directory exists
      file:
        path: /etc/systemd/system/containerd.service.d
        state: directory
        mode: '0755'

    - name: Configure proxy for containerd
      copy:
        dest: /etc/systemd/system/containerd.service.d/http-proxy.conf
        mode: '0644'
        content: |
          [Service]
          Environment="HTTP_PROXY={{ lookup('env', 'HTTP_PROXY') }}"
          Environment="HTTPS_PROXY={{ lookup('env', 'HTTPS_PROXY') }}"
          Environment="NO_PROXY={{ lookup('env', 'NO_PROXY') }}"
      when: lookup('env', 'HTTP_PROXY') != '' or lookup('env', 'HTTPS_PROXY') != ''

    - name: Enable and start containerd
      systemd:
        name: containerd
        enabled: true
        state: started
        daemon_reload: true

    - name: Wait for containerd socket to be ready
      wait_for:
        path: /run/containerd/containerd.sock
        state: present
        timeout: 30

    - name: Install crictl
      get_url:
        url: "https://github.com/kubernetes-sigs/cri-tools/releases/download/v1.31.1/crictl-v1.31.1-linux-amd64.tar.gz"
        dest: /tmp/crictl.tar.gz
        mode: '0644'
        timeout: 120
      environment: "{{ proxy_env }}"

    - name: Extract crictl to /usr/local/bin
      unarchive:
        src: /tmp/crictl.tar.gz
        dest: /usr/local/bin
        remote_src: true
        mode: '0755'

    - name: Configure crictl to use containerd
      copy:
        dest: /etc/crictl.yaml
        mode: '0644'
        content: |
          runtime-endpoint: unix:///run/containerd/containerd.sock
          image-endpoint: unix:///run/containerd/containerd.sock
          timeout: 10
          debug: false

    # ── Download Kubernetes binaries ─────────────────────────────────────────
    - name: Download kubeadm and kubelet on worker
      get_url:
        url: "{{ kube_dl_base }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: '0755'
        timeout: 120
      loop:
        - kubeadm
        - kubelet
      environment: "{{ proxy_env }}"

    - name: Write kubelet systemd service unit on worker
      copy:
        dest: /etc/systemd/system/kubelet.service
        mode: '0644'
        content: |
          [Unit]
          Description=kubelet: The Kubernetes Node Agent
          Documentation=https://kubernetes.io/docs/
          Wants=network-online.target
          After=network-online.target

          [Service]
          ExecStart=/usr/local/bin/kubelet
          Restart=always
          StartLimitInterval=0
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: Ensure kubelet drop-in directory exists on worker
      file:
        path: /etc/systemd/system/kubelet.service.d
        state: directory
        mode: '0755'

    - name: Write kubelet kubeadm drop-in config on worker
      copy:
        dest: /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
        mode: '0644'
        content: |
          [Service]
          Environment="KUBELET_KUBECONFIG_ARGS=--bootstrap-kubeconfig=/etc/kubernetes/bootstrap-kubelet.conf --kubeconfig=/etc/kubernetes/kubelet.conf"
          Environment="KUBELET_CONFIG_ARGS=--config=/var/lib/kubelet/config.yaml"
          EnvironmentFile=-/var/lib/kubelet/kubeadm-flags.env
          EnvironmentFile=-/etc/sysconfig/kubelet
          ExecStart=
          ExecStart=/usr/local/bin/kubelet $KUBELET_KUBECONFIG_ARGS $KUBELET_CONFIG_ARGS $KUBELET_KUBEADM_ARGS $KUBELET_EXTRA_ARGS

    - name: Reset any previous kubeadm state on worker
      command: kubeadm reset --force
      ignore_errors: true

    - name: Kill any process holding port 10250 on worker
      shell: fuser -k 10250/tcp 2>/dev/null || true
      ignore_errors: true

    - name: Remove stale Kubernetes state directories on worker
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet
        - /var/lib/kube-proxy
        - /var/lib/cni
        - /etc/cni/net.d
      ignore_errors: true

    - name: Restart containerd on worker
      systemd:
        name: containerd
        state: restarted

    - name: Wait for containerd CRI socket to be ready on worker
      wait_for:
        path: /run/containerd/containerd.sock
        state: present
        timeout: 30

    - name: Enable kubelet on worker
      systemd:
        name: kubelet
        enabled: true
        daemon_reload: true

    - name: Run kubeadm join
      command: >
        {{ hostvars[groups['kube_control_plane'][0]]['join_command'] }}
        --node-name={{ inventory_hostname }}
        --cri-socket unix:///run/containerd/containerd.sock
      args:
        creates: /etc/kubernetes/kubelet.conf
      environment: "{{ proxy_env }}"

    - name: Wait for worker to become Ready
      command: kubectl --kubeconfig=/etc/kubernetes/kubelet.conf get node {{ inventory_hostname }}
      register: node_ready
      until: "'Ready' in node_ready.stdout"
      retries: 30
      delay: 10
      ignore_errors: true