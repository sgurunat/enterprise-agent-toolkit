# Intel AI for Enterprise Agent Toolkit — Fresh Kubernetes cluster install via kubeadm
# Option 1: always does a clean install regardless of prior state
---
# ── Play 0: Bootstrap ALL nodes — packages, containerd, kernel settings ───────
- name: Bootstrap all nodes
  hosts: all
  gather_facts: true
  become: true
  vars:
    proxy_raw:
      HTTP_PROXY: "{{ lookup('env', 'HTTP_PROXY') }}"
      HTTPS_PROXY: "{{ lookup('env', 'HTTPS_PROXY') }}"
      NO_PROXY: "{{ lookup('env', 'NO_PROXY') }}"
      http_proxy: "{{ lookup('env', 'HTTP_PROXY') }}"
      https_proxy: "{{ lookup('env', 'HTTPS_PROXY') }}"
      no_proxy: "{{ lookup('env', 'NO_PROXY') }}"
    # Filter out empty values so tools see no proxy vars when none are configured
    proxy_env: "{{ proxy_raw | dict2items | selectattr('value') | list | items2dict }}"
    crictl_version: "v1.31.1"

  tasks:
    - name: Install required packages
      apt:
        name:
          - conntrack
          - iptables
          - containerd
          - ethtool
          - socat
          - curl
        state: present
        update_cache: true
      environment: "{{ proxy_env }}"

    - name: Ensure containerd config directory exists
      file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Generate default containerd config
      shell: containerd config default > /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml

    - name: Enable SystemdCgroup in containerd config
      replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup\s*=\s*false'
        replace: 'SystemdCgroup = true'

    - name: Ensure containerd systemd drop-in directory exists
      file:
        path: /etc/systemd/system/containerd.service.d
        state: directory
        mode: '0755'

    - name: Configure proxy for containerd (all nodes)
      copy:
        dest: /etc/systemd/system/containerd.service.d/http-proxy.conf
        content: |
          [Service]
          Environment="HTTP_PROXY={{ lookup('env', 'HTTP_PROXY') }}"
          Environment="HTTPS_PROXY={{ lookup('env', 'HTTPS_PROXY') }}"
          Environment="NO_PROXY={{ lookup('env', 'NO_PROXY') }}"
        mode: '0644'
      when: lookup('env', 'HTTP_PROXY') != '' or lookup('env', 'HTTPS_PROXY') != ''

    - name: Enable and start containerd
      systemd:
        name: containerd
        enabled: true
        state: started
        daemon_reload: true

    - name: Load required kernel modules
      modprobe:
        name: "{{ item }}"
        state: present
      loop:
        - overlay
        - br_netfilter

    - name: Persist kernel modules across reboots
      copy:
        dest: /etc/modules-load.d/k8s.conf
        mode: '0644'
        content: |
          overlay
          br_netfilter

    - name: Set required sysctl parameters
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop:
        - { key: net.ipv4.ip_forward, value: '1' }
        - { key: net.bridge.bridge-nf-call-iptables, value: '1' }
        - { key: net.bridge.bridge-nf-call-ip6tables, value: '1' }

    - name: Persist sysctl settings across reboots
      copy:
        dest: /etc/sysctl.d/99-kubernetes.conf
        content: |
          net.ipv4.ip_forward = 1
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
        mode: '0644'

    - name: Add node hostname to /etc/hosts if not resolvable
      lineinfile:
        path: /etc/hosts
        line: "{{ ansible_default_ipv4.address }} {{ inventory_hostname }}"
        regexp: "{{ inventory_hostname }}$"
        state: present

    - name: Install crictl
      get_url:
        url: "https://github.com/kubernetes-sigs/cri-tools/releases/download/{{ crictl_version }}/crictl-{{ crictl_version }}-linux-amd64.tar.gz"
        dest: /tmp/crictl.tar.gz
        mode: '0644'
        timeout: 120
      environment: "{{ proxy_env }}"

    - name: Extract crictl binary
      unarchive:
        src: /tmp/crictl.tar.gz
        dest: /usr/local/bin
        remote_src: true
        mode: '0755'

    - name: Configure crictl to use containerd
      copy:
        dest: /etc/crictl.yaml
        mode: '0644'
        content: |
          runtime-endpoint: unix:///run/containerd/containerd.sock
          image-endpoint: unix:///run/containerd/containerd.sock
          timeout: 10
          debug: false

# ── Play 1: Install Kubernetes on control plane ───────────────────────────────
- name: Fresh Kubernetes install — clean slate via kubeadm
  hosts: kube_control_plane
  gather_facts: true
  become: true
  vars:
    kube_version: "v1.31.4"
    kube_dl_base: "https://dl.k8s.io/release/{{ kube_version }}/bin/linux/amd64"
    calico_version: "v3.28.2"
    calico_manifest_url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml"
    kube_user: "{{ ansible_user }}"
    kube_user_home: "/home/{{ kube_user }}"
    proxy_raw:
      HTTP_PROXY: "{{ lookup('env', 'HTTP_PROXY') }}"
      HTTPS_PROXY: "{{ lookup('env', 'HTTPS_PROXY') }}"
      NO_PROXY: "{{ lookup('env', 'NO_PROXY') }}"
      http_proxy: "{{ lookup('env', 'HTTP_PROXY') }}"
      https_proxy: "{{ lookup('env', 'HTTPS_PROXY') }}"
      no_proxy: "{{ lookup('env', 'NO_PROXY') }}"
    # Filter out empty values so tools see no proxy vars when none are configured
    proxy_env: "{{ proxy_raw | dict2items | selectattr('value') | list | items2dict }}"

  tasks:
    # ── Step 0: Download K8s binaries if not present ──────────────────────────
    - name: Check if kubeadm already installed at correct version
      command: kubeadm version -o short
      register: kubeadm_version_check
      ignore_errors: true
      changed_when: false

    - name: Download kubectl, kubeadm, kubelet binaries
      get_url:
        url: "{{ kube_dl_base }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: '0755'
        timeout: 120
      loop:
        - kubectl
        - kubeadm
        - kubelet
      environment: "{{ proxy_env }}"
      when: >
        kubeadm_version_check.rc != 0 or
        kube_version not in (kubeadm_version_check.stdout | default(''))

    - name: Write kubelet systemd service unit
      copy:
        dest: /etc/systemd/system/kubelet.service
        mode: '0644'
        content: |
          [Unit]
          Description=kubelet: The Kubernetes Node Agent
          Documentation=https://kubernetes.io/docs/
          Wants=network-online.target
          After=network-online.target

          [Service]
          ExecStart=/usr/local/bin/kubelet
          Restart=always
          StartLimitInterval=0
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: Ensure kubelet drop-in directory exists
      file:
        path: /etc/systemd/system/kubelet.service.d
        state: directory
        mode: '0755'

    - name: Write kubelet kubeadm drop-in config
      copy:
        dest: /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
        mode: '0644'
        content: |
          # Note: This dropin only works with kubeadm and kubelet v1.11+
          [Service]
          Environment="KUBELET_KUBECONFIG_ARGS=--bootstrap-kubeconfig=/etc/kubernetes/bootstrap-kubelet.conf --kubeconfig=/etc/kubernetes/kubelet.conf"
          Environment="KUBELET_CONFIG_ARGS=--config=/var/lib/kubelet/config.yaml"
          EnvironmentFile=-/var/lib/kubelet/kubeadm-flags.env
          EnvironmentFile=-/etc/sysconfig/kubelet
          ExecStart=
          ExecStart=/usr/local/bin/kubelet $KUBELET_KUBECONFIG_ARGS $KUBELET_CONFIG_ARGS $KUBELET_KUBEADM_ARGS $KUBELET_EXTRA_ARGS

    - name: Stop kubelet before cleanup
      systemd:
        name: kubelet
        state: stopped
      ignore_errors: true

    - name: kubeadm reset to clear any previous cluster state
      command: kubeadm reset --force
      ignore_errors: true

    - name: Kill any process holding port 10250
      shell: fuser -k 10250/tcp 2>/dev/null || true
      ignore_errors: true

    - name: Remove all Kubernetes state directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/etcd
        - /var/lib/kubelet
        - /var/lib/kube-proxy
        - /var/run/kubernetes
        - /var/lib/cni
        - /etc/cni/net.d
        - /var/lib/calico
        - /etc/calico
        - /root/.kube
        - "{{ kube_user_home }}/.kube"
      ignore_errors: true

    - name: Remove leftover virtual network interfaces
      shell: |
        for iface in $(ip link show | grep -oP '(?<=\d: )(cni\S+|flannel\S+|calico\S+|tunl\S+|vxlan\S+|kube-ipvs\S+)' 2>/dev/null); do
          ip link delete "$iface" 2>/dev/null || true
        done
      ignore_errors: true

    - name: Restart containerd to ensure clean state
      systemd:
        name: containerd
        state: restarted

    - name: Wait for containerd CRI socket to be ready
      wait_for:
        path: /run/containerd/containerd.sock
        state: present
        timeout: 30

    - name: Verify containerd CRI is responding
      command: crictl info
      register: cri_check
      retries: 6
      delay: 5
      until: cri_check.rc == 0
      ignore_errors: true

    - name: Pre-pull Kubernetes images through proxy
      command: >
        kubeadm config images pull
        --cri-socket unix:///run/containerd/containerd.sock
        --kubernetes-version {{ kube_version }}
      environment: "{{ proxy_env }}"
      register: image_pull
      retries: 2
      delay: 10
      until: image_pull.rc == 0

    - name: Enable kubelet service
      systemd:
        name: kubelet
        enabled: true
        daemon_reload: true
      ignore_errors: true

    - name: Run kubeadm init
      # NOTE: if you change --service-cidr or --pod-network-cidr below, you MUST
      # also update the matching CIDRs in core/lib/system/precheck/read-config-file.sh
      # and core/lib/system/setup-env.sh, where they are added to no_proxy so that
      # in-cluster pod/service traffic bypasses the corporate proxy. Out-of-sync
      # values will route cluster-internal traffic through the proxy (403 / timeouts).
      command: >
        kubeadm init
        --node-name={{ inventory_hostname }}
        --cri-socket unix:///run/containerd/containerd.sock
        --apiserver-advertise-address={{ ansible_default_ipv4.address }}
        --apiserver-cert-extra-sans=10.96.0.1,{{ ansible_default_ipv4.address }},127.0.0.1,localhost
        --service-cidr=10.96.0.0/12
        --pod-network-cidr=192.168.0.0/16
        --upload-certs
      environment: "{{ proxy_env }}"
      register: kubeadm_output
      async: 600
      poll: 15

    - name: Fail if kubeadm init did not succeed
      fail:
        msg: "kubeadm init failed — check the output above for details."
      when: kubeadm_output.rc is defined and kubeadm_output.rc != 0

    - name: Create .kube directory for ansible user
      file:
        path: "{{ kube_user_home }}/.kube"
        state: directory
        mode: '0755'
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"

    - name: Copy admin kubeconfig for ansible user
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ kube_user_home }}/.kube/config"
        remote_src: true
        mode: '0600'
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"

    - name: Create .kube directory for root
      file:
        path: /root/.kube
        state: directory
        mode: '0755'

    - name: Copy admin kubeconfig for root
      copy:
        src: /etc/kubernetes/admin.conf
        dest: /root/.kube/config
        remote_src: true
        mode: '0600'

    - name: Remove control-plane taint for single-node scheduling
      command: kubectl taint nodes --all node-role.kubernetes.io/control-plane-
      become: false
      become_user: "{{ kube_user }}"
      environment:
        KUBECONFIG: "{{ kube_user_home }}/.kube/config"
      ignore_errors: true

    - name: Apply Calico CNI
      command: kubectl apply -f {{ calico_manifest_url }}
      become: false
      become_user: "{{ kube_user }}"
      environment: "{{ proxy_env | combine({'KUBECONFIG': kube_user_home + '/.kube/config'}) }}"

    - name: Wait for calico-node pods to be ready (up to 5 min)
      command: >
        kubectl wait --for=condition=ready pod
        -l k8s-app=calico-node -n kube-system --timeout=300s
      become: false
      become_user: "{{ kube_user }}"
      environment:
        KUBECONFIG: "{{ kube_user_home }}/.kube/config"
      register: calico_ready
      retries: 3
      delay: 15
      until: calico_ready.rc == 0

    - name: Wait for node to become Ready
      command: kubectl wait node --all --for=condition=Ready --timeout=300s
      become: false
      become_user: "{{ kube_user }}"
      environment:
        KUBECONFIG: "{{ kube_user_home }}/.kube/config"
      register: node_ready
      retries: 3
      delay: 15
      until: node_ready.rc == 0

    - name: Kubernetes cluster installed successfully
      debug:
        msg: "Kubernetes cluster is up. Run kubectl get nodes to verify."

# ── Play 2: Join worker nodes ─────────────────────────────────────────────────
- name: Join worker nodes to the cluster
  hosts: kube_control_plane
  gather_facts: false
  become: true
  tasks:
    - name: Generate kubeadm join command
      command: kubeadm token create --print-join-command
      register: join_command_raw
      changed_when: false

    - name: Set join command fact
      set_fact:
        join_command: "{{ join_command_raw.stdout }}"

- name: Run kubeadm join on each worker
  hosts: kube_node:!kube_control_plane
  gather_facts: true
  become: true
  vars:
    kube_version: "v1.31.4"
    kube_dl_base: "https://dl.k8s.io/release/{{ kube_version }}/bin/linux/amd64"
    kube_user: "{{ ansible_user }}"
    proxy_raw:
      HTTP_PROXY: "{{ lookup('env', 'HTTP_PROXY') }}"
      HTTPS_PROXY: "{{ lookup('env', 'HTTPS_PROXY') }}"
      NO_PROXY: "{{ lookup('env', 'NO_PROXY') }}"
      http_proxy: "{{ lookup('env', 'HTTP_PROXY') }}"
      https_proxy: "{{ lookup('env', 'HTTPS_PROXY') }}"
      no_proxy: "{{ lookup('env', 'NO_PROXY') }}"
    # Filter out empty values so tools see no proxy vars when none are configured
    proxy_env: "{{ proxy_raw | dict2items | selectattr('value') | list | items2dict }}"
  tasks:
    - name: Download kubeadm and kubelet on worker
      get_url:
        url: "{{ kube_dl_base }}/{{ item }}"
        dest: "/usr/local/bin/{{ item }}"
        mode: '0755'
        timeout: 120
      loop:
        - kubeadm
        - kubelet
      environment: "{{ proxy_env }}"

    - name: Write kubelet systemd service unit on worker
      copy:
        dest: /etc/systemd/system/kubelet.service
        mode: '0644'
        content: |
          [Unit]
          Description=kubelet: The Kubernetes Node Agent
          Documentation=https://kubernetes.io/docs/
          Wants=network-online.target
          After=network-online.target

          [Service]
          ExecStart=/usr/local/bin/kubelet
          Restart=always
          StartLimitInterval=0
          RestartSec=10

          [Install]
          WantedBy=multi-user.target

    - name: Ensure kubelet drop-in directory exists on worker
      file:
        path: /etc/systemd/system/kubelet.service.d
        state: directory
        mode: '0755'

    - name: Write kubelet kubeadm drop-in config on worker
      copy:
        dest: /etc/systemd/system/kubelet.service.d/10-kubeadm.conf
        mode: '0644'
        content: |
          [Service]
          Environment="KUBELET_KUBECONFIG_ARGS=--bootstrap-kubeconfig=/etc/kubernetes/bootstrap-kubelet.conf --kubeconfig=/etc/kubernetes/kubelet.conf"
          Environment="KUBELET_CONFIG_ARGS=--config=/var/lib/kubelet/config.yaml"
          EnvironmentFile=-/var/lib/kubelet/kubeadm-flags.env
          EnvironmentFile=-/etc/sysconfig/kubelet
          ExecStart=
          ExecStart=/usr/local/bin/kubelet $KUBELET_KUBECONFIG_ARGS $KUBELET_CONFIG_ARGS $KUBELET_KUBEADM_ARGS $KUBELET_EXTRA_ARGS

    - name: Reset any previous kubeadm state on worker
      command: kubeadm reset --force
      ignore_errors: true

    - name: Kill any process holding port 10250 on worker
      shell: fuser -k 10250/tcp 2>/dev/null || true
      ignore_errors: true

    - name: Remove stale Kubernetes state directories on worker
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/kubelet
        - /var/lib/kube-proxy
        - /var/lib/cni
        - /etc/cni/net.d
      ignore_errors: true

    - name: Restart containerd on worker to apply config changes
      systemd:
        name: containerd
        state: restarted

    - name: Wait for containerd CRI socket to be ready on worker
      wait_for:
        path: /run/containerd/containerd.sock
        state: present
        timeout: 30

    - name: Enable kubelet on worker
      systemd:
        name: kubelet
        enabled: true
        daemon_reload: true

    - name: Run kubeadm join
      command: >
        {{ hostvars[groups['kube_control_plane'][0]]['join_command'] }}
        --node-name={{ inventory_hostname }}
        --cri-socket unix:///run/containerd/containerd.sock
      args:
        creates: /etc/kubernetes/kubelet.conf
      environment: "{{ proxy_env }}"

    - name: Wait for worker to become Ready
      command: >
        kubectl --kubeconfig=/etc/kubernetes/kubelet.conf get node {{ ansible_hostname }}
      register: node_ready
      until: "'Ready' in node_ready.stdout"
      retries: 30
      delay: 10
      ignore_errors: true