# Intel AI for Enterprise Agent Toolkit — Full Cluster Decommission Playbook
# Option 2: stops all pods/containers via crictl (like kubespray reset role),
#           then kubeadm reset, then full directory/iptables/interface wipe
---
- name: Phase 1 — Remove all workloads and Helm releases
  hosts: "{{ inference_delegate | default('kube_control_plane') }}"
  gather_facts: false
  become: false
  tasks:
    - name: Uninstall all Helm releases across all namespaces
      shell: |
        for ns in $(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
          for release in $(helm list -n "$ns" -q 2>/dev/null); do
            echo "Uninstalling $release (namespace: $ns)"
            helm uninstall "$release" -n "$ns" --wait --timeout 3m 2>/dev/null || true
          done
        done
      ignore_errors: true

    - name: Delete all non-system namespaces
      shell: |
        system_ns="default kube-system kube-public kube-node-lease local-path-storage"
        for ns in $(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
          if ! echo "$system_ns" | grep -qw "$ns"; then
            kubectl delete namespace "$ns" --timeout=60s 2>/dev/null || true
          fi
        done
      ignore_errors: true

    - name: Delete all workloads in default namespace
      shell: |
        kubectl delete all --all -n default --timeout=60s 2>/dev/null || true
        kubectl delete pvc --all -n default 2>/dev/null || true
      ignore_errors: true

    - name: Find PVC directories on host
      find:
        paths: "{{ pvc_base_path | default('/opt/local-path-provisioner') }}"
        patterns: "pvc*"
        file_type: any
      register: pvc_dirs
      become: true
      ignore_errors: true

    - name: Remove PVC directories
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ pvc_dirs.files | default([]) }}"
      become: true
      ignore_errors: true

- name: Phase 2 — Stop all pods and containers, then kubeadm reset
  hosts: "{{ inference_delegate | default('kube_control_plane') }}"
  gather_facts: false
  become: true
  tasks:
    - name: Stop all running pods via crictl (mimics kubespray reset role)
      shell: |
        if command -v crictl &>/dev/null; then
          crictl pods -q 2>/dev/null | xargs -r crictl stopp 2>/dev/null || true
          crictl pods -q 2>/dev/null | xargs -r crictl rmp --force 2>/dev/null || true
        fi
      ignore_errors: true

    - name: Stop all remaining containers via crictl
      shell: |
        if command -v crictl &>/dev/null; then
          crictl ps -q 2>/dev/null | xargs -r crictl stop 2>/dev/null || true
          crictl ps -aq 2>/dev/null | xargs -r crictl rm --force 2>/dev/null || true
        fi
      ignore_errors: true

    - name: Stop kubelet to release port 10250 and all mounts
      systemd:
        name: kubelet
        state: stopped
        enabled: false
      ignore_errors: true

    - name: Kill any process still holding port 10250
      shell: fuser -k 10250/tcp 2>/dev/null || true
      ignore_errors: true

    - name: Unmount kubelet-managed mounts
      shell: |
        for mount in $(mount | grep '/var/lib/kubelet' | awk '{print $3}' | sort -r); do
          umount -f "$mount" 2>/dev/null || true
        done
      ignore_errors: true

    - name: Run kubeadm reset
      command: kubeadm reset --force
      ignore_errors: true

- name: Phase 3 — Wipe all K8s state, CNI, iptables and network interfaces
  hosts: "{{ inference_delegate | default('kube_control_plane') }}"
  gather_facts: false
  become: true
  tasks:
    - name: Flush iptables rules
      shell: |
        iptables -F && iptables -X
        iptables -t nat -F && iptables -t nat -X
        iptables -t mangle -F && iptables -t mangle -X
        ip6tables -F 2>/dev/null || true
        ip6tables -X 2>/dev/null || true
      ignore_errors: true

    - name: Remove all Kubernetes and CNI state directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/kubernetes
        - /var/lib/etcd
        - /var/lib/kubelet
        - /var/lib/kube-proxy
        - /var/run/kubernetes
        - /etc/cni/net.d
        - /opt/cni/bin
        - /var/lib/cni
        - /var/lib/calico
        - /etc/calico
        - /root/.kube
        - /home/ubuntu/.kube
      ignore_errors: true

    - name: Remove kubelet service override directory
      file:
        path: /etc/systemd/system/kubelet.service.d
        state: absent
      ignore_errors: true

    - name: Remove leftover virtual network interfaces
      shell: |
        for iface in $(ip link show | grep -oP '(?<=\d: )(cni\S+|flannel\S+|calico\S+|tunl\S+|vxlan\S+|kube-ipvs\S+)' 2>/dev/null); do
          ip link delete "$iface" 2>/dev/null || true
        done
      ignore_errors: true

    - name: Remove Kubernetes binaries (kubectl, kubeadm, kubelet)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/local/bin/kubectl
        - /usr/local/bin/kubeadm
        - /usr/local/bin/kubelet
        - /usr/local/bin/kube-proxy
        - /usr/local/bin/kubernetes-scripts
        - /etc/systemd/system/kubelet.service
      ignore_errors: true

    - name: Reload systemd after removing kubelet service unit
      systemd:
        daemon_reload: true
      ignore_errors: true

    - name: Restart containerd to clear all container state
      systemd:
        name: containerd
        state: restarted
      ignore_errors: true

    - name: Decommission complete
      debug:
        msg: >
          Kubernetes cluster has been fully decommissioned.
          Run agentic-stack.sh option 1 with deploy_kubernetes_fresh=on to redeploy.
