---
#- import_playbook: "{{ lookup('env', 'PWD') }}/config/inference_env.yml"

- name: Deploy Cluster Configurations
  hosts: "{{ inference_delegate | default('kube_control_plane') }}"
  gather_facts: false
  any_errors_fatal: "{{ any_errors_fatal | default(true) }}"
  environment: "{{ proxy_disable_env | default(env_proxy | default({})) }}"
  vars_files:
    - "{{ lookup('env', 'PWD') }}/config/vars/inference_common.yml"
    - "{{ lookup('env', 'PWD') }}/config/vars/inference_delegate.yml"
  roles:
    - role: inference-tools
  tasks:
    - name: Create TLS cert for Admin dashboard
      community.kubernetes.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ secret_name }}"
            namespace: kube-system
          type: kubernetes.io/tls
          data:
            tls.crt: "{{ lookup('file', cert_file) | b64encode }}"
            tls.key: "{{ lookup('file', key_file) | b64encode }}"
      register: kubectl_output
      tags: deploy_cluster_dashboard
    - name: Create Admin dashboard ingress
      community.kubernetes.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            annotations:
              nginx.ingress.kubernetes.io/backend-protocol: HTTPS
              nginx.ingress.kubernetes.io/rewrite-target: /$2
            name: kubernetes-dashboard-ingress
            namespace: kube-system
          spec:
            ingressClassName: nginx
            rules:
              - host: "{{ secret_name }}"
                http:
                  paths:
                    - backend:
                        service:
                          name: kubernetes-dashboard
                          port:
                            number: 443
                      path: /dashboard(/|$)(.*)
                      pathType: ImplementationSpecific
            tls:
              - hosts:
                  - "{{ secret_name }}"
                secretName: "{{ secret_name }}"
      when: brownfield_deployment != "yes"
      tags: deploy_cluster_dashboard
    - name: Create ServiceAccount for Admin Dashboard
      community.kubernetes.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: dashboard-user
            namespace: kube-system
      tags: deploy_cluster_dashboard
    - name: Create ClusterRole for Kubernetes Dashboard
      community.kubernetes.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: kubernetes-dashboard-role
          rules:
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["pods", "services", "nodes"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["pods", "nodes"]
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["services/proxy"]
              resourceNames: ["https:kubernetes-dashboard:https"]
              verbs: ["get", "create", "update"]
      tags: deploy_cluster_dashboard
    - name: Create ClusterRoleBinding for Admin Dashboard
      community.kubernetes.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: kubernetes-dashboard-rolebinding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: kubernetes-dashboard-role
          subjects:
            - kind: ServiceAccount
              name: dashboard-user
              namespace: kube-system
      tags: deploy_cluster_dashboard
    - name: Install local-path-provisioner StorageClass
      ansible.builtin.shell: |
        kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/v0.0.30/deploy/local-path-storage.yaml
      register: local_path_install
      changed_when: "'created' in local_path_install.stdout or 'configured' in local_path_install.stdout"
      tags: always

    - name: Pre-pull local-path-provisioner image via containerd
      ansible.builtin.shell: |
        crictl pull docker.io/rancher/local-path-provisioner:v0.0.30
      register: lpp_pull
      retries: 3
      delay: 10
      until: lpp_pull.rc == 0
      tags: always

    - name: Wait for local-path-provisioner to be ready
      ansible.builtin.shell: |
        kubectl rollout status deployment/local-path-provisioner -n local-path-storage --timeout=300s
      register: local_path_ready
      retries: 5
      delay: 15
      until: local_path_ready.rc == 0
      tags: always

    - name: Set local-path as default StorageClass
      ansible.builtin.shell: |
        kubectl patch storageclass local-path \
          -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
      register: local_path_patch
      changed_when: "'patched' in local_path_patch.stdout"
      tags: always

    - name: Remove any existing deployment directory
      ansible.builtin.file:
        path: "{{ remote_helm_charts_base }}"
        state: absent
      tags: always
