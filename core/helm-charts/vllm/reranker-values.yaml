# Values for deploying BAAI/bge-reranker-base reranking model via vLLM

LLM_MODEL_ID: "BAAI/bge-reranker-base"
SERVED_MODEL_NAME: "BAAI/bge-reranker-base"

port: 2082

image:
  repository: vllm/vllm-openai-cpu
  tag: "v0.23.0"
  pullPolicy: IfNotPresent

pvc:
  enabled: false

resources:
  requests:
    cpu: "8"
    memory: "16Gi"
  limits:
    cpu: "8"
    memory: "16Gi"

defaultModelConfigs:
  configMapValues:
    USER: "vllm"
    LOGNAME: "vllm"
    XDG_CACHE_HOME: "/tmp/.cache"
    TORCHINDUCTOR_CACHE_DIR: "/tmp/torchinductor_cache"
    HF_HUB_DISABLE_XET: "1"
  extraCmdArgs: []

modelConfigs:
  "BAAI/bge-reranker-base":
    configMapValues:
      USER: "vllm"
      LOGNAME: "vllm"
      XDG_CACHE_HOME: "/tmp/.cache"
      TORCHINDUCTOR_CACHE_DIR: "/tmp/torchinductor_cache"
      HF_HUB_DISABLE_XET: "1"
    extraCmdArgs:
      - "--dtype"
      - "bfloat16"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: ei-inference-eligible
          operator: In
          values: ["true"]
        - key: node-role.kubernetes.io/control-plane
          operator: DoesNotExist

global:
  HUGGINGFACEHUB_API_TOKEN: ""
  http_proxy: ""
  https_proxy: ""
  no_proxy: ""
  modelUseHostPath: ""
  modelUsePVC: ""
  monitoring: false
  prometheusRelease: observability