
# ---------------------------------------------------------------------------
# Standalone Redis Stack — shared memory backend for agentic workloads
#
# Deployed into the `redis` namespace as a single instance with RediSearch.
# After deployment the in-cluster URL is:
#
#   redis://redis.redis.svc.cluster.local:6379
#
# ---------------------------------------------------------------------------

redis:
  redis_stack_server:
    # Must match an existing StorageClass; this cluster uses local-path (provided by Kubespray).
    storage_class: local-path
    storage: 4Gi
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: ei-infra-eligible
              operator: In
              values: ["true"]
          - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
    tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
