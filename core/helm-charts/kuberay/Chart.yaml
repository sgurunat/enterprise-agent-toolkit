apiVersion: v2
name: kuberay-cluster
description: >
  Ray distributed-computing cluster for the Intel AI for Enterprise Agent Toolkit.
  Deploys a RayCluster CR that the KubeRay operator (installed separately via
  its upstream Helm chart) reconciles into head + worker pods.
  Worker count and resources are fully controlled via values / --set overrides,
  enabling single-node and multi-node configurations without touching YAML.
type: application
version: 0.1.0
appVersion: "2.9.0"
keywords:
  - ray
  - distributed
  - kuberay
  - parallel
  - agentic-ai
