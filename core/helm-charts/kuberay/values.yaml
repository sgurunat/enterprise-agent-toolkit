# ---------------------------------------------------------------------------
# KubeRay Cluster — distributed computing for agentic workloads
#
# After deployment the in-cluster addresses are:
#
#   Ray Client  : ray://ray-cluster-head-svc.ray-system.svc.cluster.local:10001
#   Ray Dashboard: http://ray-cluster-head-svc.ray-system.svc.cluster.local:8265
#
# All values below can be overridden via --set in kuberay-controller.sh,
# which reads them from agentic-config.cfg automatically.
# ---------------------------------------------------------------------------

cluster:
  # Name of the RayCluster resource (must be DNS-label safe)
  name: ray-cluster

  # Ray container image — version must match the ray[default] package installed
  # in any client that connects.
  rayImage: rayproject/ray:2.9.0-py310

  # ---------------------------------------------------------------------------
  # Head node — acts as coordinator / scheduler only.
  # Setting num-cpus to "0" prevents the scheduler from placing user tasks on
  # the head node; all workloads run on worker pods.
  # ---------------------------------------------------------------------------
  head:
    cpuRequest: "500m"
    cpuLimit: "1"
    memoryRequest: "2Gi"
    memoryLimit: "4Gi"

  # ---------------------------------------------------------------------------
  # Worker group — scale-out nodes that execute Ray tasks.
  #
  # replicas     : initial number of workers on cluster creation
  # minReplicas  : floor for Ray autoscaler (set equal to replicas to disable scale-in)
  # maxReplicas  : ceiling for Ray autoscaler
  #
  # Tune cpuRequest/cpuLimit per the workload profile:
  #   • Light (dev / single-node)  : request=500m  limit=2
  #   • Medium (default)           : request=500m  limit=2
  #   • Heavy (multi-node GPU)     : request=2     limit=8
  # ---------------------------------------------------------------------------
  worker:
    groupName: default-worker
    replicas: 2
    minReplicas: 1
    maxReplicas: 4
    cpuRequest: "500m"
    cpuLimit: "2"
    memoryRequest: "2Gi"
    memoryLimit: "4Gi"

# ---------------------------------------------------------------------------
# Scheduling — pin all Ray pods (head + workers) to master/control-plane nodes.
# Only the vLLM model pod should run on worker nodes.
# ---------------------------------------------------------------------------
tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: ei-infra-eligible
          operator: In
          values: ["true"]
      - matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
