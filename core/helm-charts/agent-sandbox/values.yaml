# ---------------------------------------------------------------------------
# Agent Sandbox — deployment overrides for the Intel AI for Enterprise Agent Toolkit
#
# These values are merged on top of the upstream helm/values.yaml at deploy
# time via:
#   helm upgrade --install agent-sandbox <upstream-chart-dir> \
#     -f <this-file> --set image.tag=<version>
#
# The upstream chart is obtained by cloning the agent-sandbox source at the
# version pinned in core/inventory/metadata/agentic-metadata.cfg
# (agent_sandbox_version).
# ---------------------------------------------------------------------------

controller:
  # Enable all extension controllers:
  # SandboxTemplate, SandboxClaim, and SandboxWarmPool reconcilers.
  # WarmPool instances are not pre-created; apply SandboxWarmPool CRs later
  # to extend with warm pool support.
  extensions: true

  # Leader election keeps a single active controller in HA deployments.
  leaderElect: true

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

nodeSelector: {}

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: ei-infra-eligible
          operator: In
          values: ["true"]
      - matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
