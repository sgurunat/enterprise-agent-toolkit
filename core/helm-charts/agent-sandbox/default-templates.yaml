# ---------------------------------------------------------------------------
# Default SandboxTemplate — deployed to the 'agent-sandbox-system' namespace
# so all Agent Sandbox components share one namespace and the controller's
# auto-generated NetworkPolicy (which allows ingress from app=sandbox-router
# pods in the same namespace) permits router → sandbox traffic:
#
#   from k8s_agent_sandbox import SandboxClient
#   client = SandboxClient()
#   sandbox = client.create_sandbox(
#       template="python-sandbox-template",
#       namespace="agent-sandbox",
#   )
#
# The image tag placeholder AGENT_SANDBOX_VERSION is substituted at deploy
# time (via sed) with the version from agentic-metadata.cfg, e.g. v0.4.6.
#
# The python-runtime-sandbox image implements the Agent Sandbox command API:
#   POST /execute  {"command": "..."}  →  {stdout, stderr, exit_code}
# The image is built locally from the agent-sandbox source tree and injected
# into the containerd k8s.io namespace with imagePullPolicy: Never.
#
# To extend with warm pools, create a SandboxWarmPool CR referencing this
# template after the controller is running.
# ---------------------------------------------------------------------------
apiVersion: extensions.agents.x-k8s.io/v1alpha1
kind: SandboxTemplate
metadata:
  name: python-sandbox-template
  namespace: agent-sandbox
  labels:
    app.kubernetes.io/managed-by: agentic-ai-stack
spec:
  # service: true ensures a headless Service is created for each Sandbox pod.
  # Required in v0.4.6+ for in-cluster DNS routing and SDK Tunnel mode.
  service: true
  podTemplate:
    spec:
      containers:
      - name: runtime
        image: python-runtime-sandbox:AGENT_SANDBOX_VERSION
        imagePullPolicy: Never
        ports:
        - name: api
          containerPort: 8888
          protocol: TCP
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
---
