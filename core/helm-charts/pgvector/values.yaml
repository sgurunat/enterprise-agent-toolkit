image:
  repository: pgvector/pgvector
  tag: pg16
  pullPolicy: IfNotPresent

auth:
  # Required: set via --set or a custom values file. Do not use defaults in production.
  postgresPassword: ""
  username: "agentuser"
  password: ""
  database: "agentdb"

persistence:
  size: 10Gi
  storageClassName: "local-path"

service:
  type: ClusterIP
  port: 5432

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

tolerations:
  - key: "node-role.kubernetes.io/control-plane"
    operator: "Exists"
    effect: "NoSchedule"
  - key: "node-role.kubernetes.io/master"
    operator: "Exists"
    effect: "NoSchedule"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: ei-infra-eligible
          operator: In
          values: ["true"]
      - matchExpressions:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
