apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pgvector.fullname" . }}-init
  labels:
    {{- include "pgvector.labels" . | nindent 4 }}
data:
  01-init-extensions.sql: |
    -- Enable pgvector
    CREATE EXTENSION IF NOT EXISTS vector;

    -- Grant application user full privileges
    GRANT ALL PRIVILEGES ON DATABASE {{ .Values.auth.database }} TO {{ .Values.auth.username }};
    GRANT ALL ON SCHEMA public TO {{ .Values.auth.username }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public
      GRANT ALL ON TABLES TO {{ .Values.auth.username }};
    ALTER DEFAULT PRIVILEGES IN SCHEMA public
      GRANT ALL ON SEQUENCES TO {{ .Values.auth.username }};

  02-create-agent-tables.sql: |
    \connect {{ .Values.auth.database }}

    SET ROLE {{ .Values.auth.username }};

    -- Long-term agent memory with vector embeddings
    CREATE TABLE IF NOT EXISTS agent_memory (
        id            BIGSERIAL PRIMARY KEY,
        agent_id      TEXT        NOT NULL,
        user_id       TEXT        NOT NULL DEFAULT 'default',
        session_id    TEXT,
        content       TEXT        NOT NULL,
        embedding     VECTOR(1536),
        metadata      JSONB       NOT NULL DEFAULT '{}',
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS agent_memory_embedding_idx
        ON agent_memory USING hnsw (embedding vector_cosine_ops)
        WITH (m = 16, ef_construction = 64);

    CREATE INDEX IF NOT EXISTS agent_memory_agent_user_idx
        ON agent_memory (agent_id, user_id);

    -- Audit log of every agent action / tool call / LLM response
    CREATE TABLE IF NOT EXISTS agent_events (
        id            BIGSERIAL PRIMARY KEY,
        agent_id      TEXT        NOT NULL,
        user_id       TEXT        NOT NULL DEFAULT 'default',
        session_id    TEXT,
        event_type    TEXT        NOT NULL,
        payload       JSONB       NOT NULL DEFAULT '{}',
        duration_ms   INTEGER,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS agent_events_agent_session_idx
        ON agent_events (agent_id, session_id, created_at DESC);

    -- Persistent cache: tool results and LLM responses
    CREATE TABLE IF NOT EXISTS agent_cache (
        id            BIGSERIAL PRIMARY KEY,
        cache_key     TEXT        NOT NULL UNIQUE,
        embedding     VECTOR(1536),
        value         JSONB       NOT NULL,
        hit_count     INTEGER     NOT NULL DEFAULT 0,
        expires_at    TIMESTAMPTZ,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS agent_cache_embedding_idx
        ON agent_cache USING hnsw (embedding vector_cosine_ops)
        WITH (m = 16, ef_construction = 64);

    RESET ROLE;
