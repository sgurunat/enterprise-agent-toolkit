{{- if or (empty .Values.auth.postgresPassword) (empty .Values.auth.password) }}
{{- fail "pgvector: auth.postgresPassword and auth.password must be set. Pass them via --set or a custom values file." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pgvector.fullname" . }}-credentials
  labels:
    {{- include "pgvector.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.auth.postgresPassword | quote }}
  POSTGRES_USER: {{ .Values.auth.username | quote }}
  POSTGRES_USER_PASSWORD: {{ .Values.auth.password | quote }}
  POSTGRES_DB: {{ .Values.auth.database | quote }}
  DATABASE_URL: "postgresql://{{ .Values.auth.username }}:{{ .Values.auth.password }}@{{ include "pgvector.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}/{{ .Values.auth.database }}"
  POSTGRES_DSN: "host={{ include "pgvector.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local port={{ .Values.service.port }} dbname={{ .Values.auth.database }} user={{ .Values.auth.username }} password={{ .Values.auth.password }} sslmode=disable"
